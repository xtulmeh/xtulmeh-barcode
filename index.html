<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickScan Bill Maker</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f4f4f9; }
        #reader { width: 100%; max-width: 500px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #007bff; color: white; }
        .controls { margin-bottom: 20px; text-align: center; }
        input { width: 60px; padding: 5px; }
        .no-print { display: block; }
        
        @media print {
            .no-print, #reader, button { display: none !important; }
            body { margin: 0; }
            table { border: none; }
        }
    </style>
</head>
<body>

    <h2 style="text-align: center;">Grocery Billing System</h2>

    <div id="reader" class="no-print"></div>

    <div class="controls no-print">
        <button onclick="window.print()" style="padding: 10px 20px; background: green; color: white; border: none; border-radius: 5px; cursor: pointer;">Print Receipt</button>
    </div>

    <table id="billTable">
        <thead>
            <tr>
                <th>Product</th>
                <th>Qty</th>
                <th>MRP</th>
                <th>Selling Price</th>
                <th>Disc.</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody id="billBody">
            </tbody>
    </table>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 150 } };

        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);

        async function onScanSuccess(decodedText) {
            // Pause scanning to process
            html5QrCode.pause();
            
            try {
                const response = await fetch(`https://world.openfoodfacts.org/api/v0/product/${decodedText}.json`);
                const data = await response.json();

                if (data.status === 1) {
                    const product = data.product;
                    addItemToBill(product.product_name || "Unknown Item", product.quantity || "N/A");
                } else {
                    alert("Product not found. Manually adding...");
                    addItemToBill("Manual Item", "1");
                }
            } catch (err) {
                console.error("Fetch error:", err);
            }

            // Resume scanning after 2 seconds
            setTimeout(() => html5QrCode.resume(), 2000);
        }

        function addItemToBill(name, qtyDesc) {
            const tbody = document.getElementById('billBody');
            const row = tbody.insertRow();
            
            row.innerHTML = `
                <td>${name} (${qtyDesc})</td>
                <td><input type="number" value="1" oninput="calculateRow(this)"></td>
                <td><input type="number" value="0" oninput="calculateRow(this)"></td>
                <td><input type="number" value="0" oninput="calculateRow(this)"></td>
                <td><input type="number" value="0" oninput="calculateRow(this)"></td>
                <td class="row-total">0.00</td>
            `;
        }

        function calculateRow(input) {
            const row = input.parentElement.parentElement;
            const qty = parseFloat(row.cells[1].children[0].value) || 0;
            const sp = parseFloat(row.cells[3].children[0].value) || 0;
            const disc = parseFloat(row.cells[4].children[0].value) || 0;
            
            const total = (qty * sp) - disc;
            row.cells[5].innerText = total.toFixed(2);
        }
    </script>
</body>
</html>
