<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Grocery Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background: #f0f2f5; }
        #reader { width: 100%; max-width: 500px; margin: 10px auto; border-radius: 8px; overflow: hidden; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background-color: #007bff; color: white; }
        input { width: 70px; padding: 6px; border: 1px solid #ddd; border-radius: 4px; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-print { background: #28a745; color: white; margin-top: 10px; }
        .btn-clear { background: #dc3545; color: white; float: right; }
        
        @media print {
            .no-print, #reader, .btn, .btn-clear { display: none !important; }
            .container { box-shadow: none; width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <button class="btn btn-clear no-print" onclick="if(confirm('Clear current bill?')) location.reload()">Clear Bill</button>
    <h2 style="margin-top: 0;">Grocery Bill Generator</h2>
    
    <div id="reader" class="no-print"></div>

    <div class="no-print" style="text-align: center; margin-top: 10px;">
        <button class="btn btn-print" onclick="window.print()">Print Receipt</button>
        <p><small>Scanning auto-saves prices to this device.</small></p>
    </div>

    <table id="billTable">
        <thead>
            <tr>
                <th>Item</th>
                <th>Qty</th>
                <th>MRP</th>
                <th>Our Price</th>
                <th>Disc.</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody id="billBody"></tbody>
    </table>
</div>

<script>
    const html5QrCode = new Html5Qrcode("reader");
    const config = { fps: 15, qrbox: { width: 250, height: 150 } };

    html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);

    async function onScanSuccess(barcode) {
        html5QrCode.pause();
        
        // 1. Check LocalStorage first for saved prices
        let savedData = JSON.parse(localStorage.getItem(barcode)) || null;
        
        if (savedData) {
            addItemToBill(savedData.name, savedData.mrp, savedData.sp, barcode);
        } else {
            // 2. If not saved, fetch from Open Food Facts
            try {
                const response = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
                const data = await response.json();
                const name = (data.status === 1) ? data.product.product_name : "New Item";
                addItemToBill(name, 0, 0, barcode);
            } catch (err) {
                addItemToBill("Manual Item", 0, 0, barcode);
            }
        }

        setTimeout(() => html5QrCode.resume(), 2500);
    }

    function addItemToBill(name, mrp, sp, barcode) {
        const tbody = document.getElementById('billBody');
        const row = tbody.insertRow();
        
        row.innerHTML = `
            <td>${name}</td>
            <td><input type="number" value="1" oninput="updateAndSave(this, '${barcode}', '${name}')"></td>
            <td><input type="number" value="${mrp}" oninput="updateAndSave(this, '${barcode}', '${name}')"></td>
            <td><input type="number" value="${sp}" oninput="updateAndSave(this, '${barcode}', '${name}')"></td>
            <td><input type="number" value="0" oninput="updateAndSave(this, '${barcode}', '${name}')"></td>
            <td class="row-total">0.00</td>
        `;
        calculateRow(row);
    }

    function updateAndSave(input, barcode, name) {
        const row = input.parentElement.parentElement;
        const mrp = row.cells[2].children[0].value;
        const sp = row.cells[3].children[0].value;

        // Save price data to local memory
        const productData = { name: name, mrp: mrp, sp: sp };
        localStorage.setItem(barcode, JSON.stringify(productData));

        calculateRow(row);
    }

    function calculateRow(row) {
        const qty = parseFloat(row.cells[1].children[0].value) || 0;
        const sp = parseFloat(row.cells[3].children[0].value) || 0;
        const disc = parseFloat(row.cells[4].children[0].value) || 0;
        
        const total = (qty * sp) - disc;
        row.cells[5].innerText = total.toFixed(2);
    }
</script>
</body>
</html>
